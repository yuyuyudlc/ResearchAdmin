basePath: /api/v1
definitions:
  domain.ACLSubjectType:
    enum:
    - user
    - public
    type: string
    x-enum-varnames:
    - ACLSubjectTypeUser
    - ACLSubjectTypePublic
  domain.DocumentType:
    enum:
    - rich_text
    - file
    type: string
    x-enum-varnames:
    - DocumentTypeRichText
    - DocumentTypeFile
  domain.ProfessionalTitle:
    enum:
    - professor
    - associate_professor
    - lecturer
    - researcher
    - engineer
    - doctoral_student
    - master_student
    - other
    type: string
    x-enum-varnames:
    - ProfessionalTitleProfessor
    - ProfessionalTitleAssociateProfessor
    - ProfessionalTitleLecturer
    - ProfessionalTitleResearcher
    - ProfessionalTitleEngineer
    - ProfessionalTitleDoctoralStudent
    - ProfessionalTitleMasterStudent
    - ProfessionalTitleOther
  domain.WorkspaceMemberRole:
    enum:
    - owner
    - member
    type: string
    x-enum-varnames:
    - WorkspaceMemberRoleOwner
    - WorkspaceMemberRoleMember
  domain.WorkspaceStatus:
    enum:
    - active
    - deleted
    type: string
    x-enum-varnames:
    - WorkspaceStatusActive
    - WorkspaceStatusDeleted
  handler.ChangePasswordRequest:
    properties:
      new_password:
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  handler.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handler.RegisterRequest:
    properties:
      avatar_url:
        type: string
      email:
        type: string
      organization:
        type: string
      password:
        type: string
      professional_title:
        $ref: '#/definitions/domain.ProfessionalTitle'
      signature:
        type: string
      supervisor:
        type: string
      username:
        type: string
    required:
    - email
    - password
    - username
    type: object
  handler.UpdateProfileRequest:
    properties:
      avatar_url:
        type: string
      email:
        type: string
      organization:
        type: string
      professional_title:
        $ref: '#/definitions/domain.ProfessionalTitle'
      signature:
        type: string
      supervisor:
        type: string
      username:
        type: string
    required:
    - email
    - username
    type: object
  handler.createACLRequest:
    properties:
      inherit:
        example: true
        type: boolean
      permissionBit:
        example: 3
        type: integer
      subjectId:
        example: 00000000-0000-0000-0000-000000000000
        type: string
      subjectType:
        allOf:
        - $ref: '#/definitions/domain.ACLSubjectType'
        example: user
    required:
    - permissionBit
    - subjectType
    type: object
  handler.createDocumentRequest:
    properties:
      docType:
        allOf:
        - $ref: '#/definitions/domain.DocumentType'
        example: rich_text
      parentId:
        example: ""
        type: string
      sourceStorageKey:
        example: ""
        type: string
      summary:
        example: ""
        type: string
      title:
        example: 需求文档
        type: string
    required:
    - title
    type: object
  handler.createWorkspaceRequest:
    properties:
      description:
        example: 项目资料
        type: string
      name:
        example: 研发空间
        type: string
    required:
    - name
    type: object
  handler.memberRequest:
    properties:
      role:
        allOf:
        - $ref: '#/definitions/domain.WorkspaceMemberRole'
        example: member
      userId:
        example: 00000000-0000-0000-0000-000000000000
        type: string
    required:
    - role
    - userId
    type: object
  handler.moveDocumentRequest:
    properties:
      parentId:
        example: ""
        type: string
      sortOrder:
        example: 1000
        type: integer
    type: object
  handler.updateACLRequest:
    properties:
      inherit:
        example: true
        type: boolean
      permissionBit:
        example: 1
        type: integer
    type: object
  handler.updateDocumentRequest:
    properties:
      sourceStorageKey:
        example: ""
        type: string
      summary:
        example: ""
        type: string
      title:
        example: 需求文档
        type: string
    type: object
  handler.updateMemberRequest:
    properties:
      role:
        allOf:
        - $ref: '#/definitions/domain.WorkspaceMemberRole'
        example: member
    required:
    - role
    type: object
  handler.updateWorkspaceRequest:
    properties:
      description:
        type: string
      name:
        type: string
      status:
        $ref: '#/definitions/domain.WorkspaceStatus'
    type: object
  response.Body:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  service.UserResponse:
    properties:
      avatarUrl:
        type: string
      displayName:
        type: string
      email:
        type: string
      id:
        type: string
      organization:
        type: string
      organizationId:
        type: string
      professionalTitle:
        $ref: '#/definitions/domain.ProfessionalTitle'
      signature:
        type: string
      status:
        type: string
      supervisor:
        type: string
      username:
        type: string
    type: object
info:
  contact: {}
  description: 科研项目文档管理系统后端 API。
  title: Research Admin Backend API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: 使用邮箱和密码登录，返回 JWT 访问令牌和用户信息。
      parameters:
      - description: 登录参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
      summary: 用户登录
      tags:
      - auth
  /auth/password:
    put:
      consumes:
      - application/json
      description: 修改当前登录用户的密码。
      parameters:
      - description: 修改密码参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 修改密码
      tags:
      - auth
  /auth/profile:
    put:
      consumes:
      - application/json
      description: 修改当前登录用户的个人资料。
      parameters:
      - description: 个人资料参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 修改个人信息
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: 创建新用户账号。
      parameters:
      - description: 注册参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
      summary: 注册账号
      tags:
      - auth
  /documents/{documentId}:
    delete:
      description: 软删除文档。
      parameters:
      - description: 文档 ID
        in: path
        name: documentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 删除文档
      tags:
      - documents
    get:
      description: 返回单个文档元数据和当前用户最终权限。
      parameters:
      - description: 文档 ID
        in: path
        name: documentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 获取文档详情
      tags:
      - documents
    patch:
      consumes:
      - application/json
      description: 更新文档元数据，不处理正文内容。
      parameters:
      - description: 文档 ID
        in: path
        name: documentId
        required: true
        type: string
      - description: 文档更新参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.updateDocumentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 更新文档元数据
      tags:
      - documents
  /documents/{documentId}/acl:
    get:
      description: 返回文档上显式配置的 ACL 规则，不包含 workspace 默认权限。
      parameters:
      - description: 文档 ID
        in: path
        name: documentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 获取文档 ACL
      tags:
      - document-acl
    post:
      consumes:
      - application/json
      description: 为文档新增一条 ACL 规则。
      parameters:
      - description: 文档 ID
        in: path
        name: documentId
        required: true
        type: string
      - description: ACL 参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.createACLRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 新增文档 ACL
      tags:
      - document-acl
  /documents/{documentId}/acl/{aclId}:
    delete:
      description: 删除文档上的指定 ACL 规则。
      parameters:
      - description: 文档 ID
        in: path
        name: documentId
        required: true
        type: string
      - description: ACL ID
        in: path
        name: aclId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 删除文档 ACL
      tags:
      - document-acl
    patch:
      consumes:
      - application/json
      description: 更新文档上的指定 ACL 规则。
      parameters:
      - description: 文档 ID
        in: path
        name: documentId
        required: true
        type: string
      - description: ACL ID
        in: path
        name: aclId
        required: true
        type: string
      - description: ACL 更新参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.updateACLRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 更新文档 ACL
      tags:
      - document-acl
  /documents/{documentId}/archive:
    post:
      description: 将文档标记为 archived。
      parameters:
      - description: 文档 ID
        in: path
        name: documentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 归档文档
      tags:
      - documents
  /documents/{documentId}/body:
    get:
      description: 返回文档的 yjs 状态或文件二进制数据。
      parameters:
      - description: 文档 ID
        in: path
        name: documentId
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 获取文档正文
      tags:
      - documents
    put:
      consumes:
      - application/octet-stream
      description: 上传文档正文（yjs 二进制状态 或 文件）。权限：EDIT。
      parameters:
      - description: 文档 ID
        in: path
        name: documentId
        required: true
        type: string
      - description: 正文类型（yjs_state/pdf/word/video）
        in: header
        name: X-Body-Type
        type: string
      - description: 正文二进制
        in: body
        name: request
        required: true
        schema:
          type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 更新文档正文
      tags:
      - documents
  /documents/{documentId}/download:
    get:
      description: 返回文件型文档的存储引用。
      parameters:
      - description: 文档 ID
        in: path
        name: documentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 下载文件型文档
      tags:
      - documents
  /documents/{documentId}/favorite:
    delete:
      description: 当前用户取消收藏指定文档。要求当前用户至少拥有该文档 READ 权限。
      parameters:
      - description: 文档 ID
        in: path
        name: documentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 取消收藏文档
      tags:
      - documents
    post:
      description: 当前用户收藏指定文档。要求当前用户至少拥有该文档 READ 权限，重复收藏保持幂等。
      parameters:
      - description: 文档 ID
        in: path
        name: documentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 收藏文档
      tags:
      - documents
  /documents/{documentId}/move:
    post:
      consumes:
      - application/json
      description: 移动文档到新的父节点并更新排序。
      parameters:
      - description: 文档 ID
        in: path
        name: documentId
        required: true
        type: string
      - description: 移动参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.moveDocumentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 移动文档
      tags:
      - documents
  /documents/{documentId}/my-permission:
    get:
      description: 返回当前用户对文档的最终权限位。
      parameters:
      - description: 文档 ID
        in: path
        name: documentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 获取我的文档权限
      tags:
      - document-acl
  /documents/{documentId}/restore:
    post:
      description: 将归档文档恢复为 active。
      parameters:
      - description: 文档 ID
        in: path
        name: documentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 恢复文档
      tags:
      - documents
  /documents/home:
    get:
      description: 按 scope 返回当前用户的首页文档列表。scope=mine 返回我创建的，scope=recent 返回最近打开，scope=favorite
        返回我收藏的。
      parameters:
      - description: 列表范围：mine/recent/favorite
        in: query
        name: scope
        required: true
        type: string
      - description: 返回数量，默认 20，最大 50
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 获取首页文档列表
      tags:
      - documents
  /users/search:
    get:
      consumes:
      - application/json
      description: 根据用户名、邮箱或显示名称模糊搜索非禁用的用户。
